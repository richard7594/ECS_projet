name : Terraform_deploy
on:
  push:
    branches:
    - 'main'


jobs:
  _fmt_:
    name: fmt
    runs-on: ubuntu-latest
    services:
      image: hashicorp/terraform:latest
      entrypoint: ""
    steps:
    - uses: actions/checkout@v6
    - name : init 
      run : terraform init 
    - name: fmt
      run : terraform fmt --recursive


jobs:
  _validate_:
    name: validate
    runs-on: ubuntu-latest
    services:
      image: hashicorp/terraform:latest
      entrypoint: ""
    steps:
    - uses: actions/checkout@v6
    - name : init 
      run : terraform init
    - name: validate
      run : terraform validate
  

      