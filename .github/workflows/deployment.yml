name : Terraform_deploy
on:
  push:
    branches:
    - 'main'
  workflow_dispatch:  

jobs:
  _build_:
    name : build_app_image
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - name: install docker
      run: |
       curl -fsSL https://get.docker.com -o get-docker.sh && \
       sh get-docker.sh
    - name: build  
      run: docker build .


  _fmt_:
    name: fmt
    runs-on: ubuntu-latest
    environment: DEV
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
    container:
      image: hashicorp/terraform:latest
    steps:
    - uses: actions/checkout@v6
    - name : init 
      run : terraform init 
    - name: fmt
      run : terraform fmt --recursive
    - uses: actions/upload-artifact@v7
      with:
        name: fmt
        path: .  
    needs: _build_

  _validate_:
    name: validate
    runs-on: ubuntu-latest
    environment: DEV
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }} 
    container:
      image: hashicorp/terraform:latest 
    steps:
    - uses: actions/download-artifact@v7
      with:
        name: fmt
    - name: init 
      run: terraform init
    - name: validate
      run: terraform validate
    - uses: actions/upload-artifact@v7
      with:
        name: validate
        path: .  
    needs: _fmt_  
  
  _plan_:
    name: plan
    runs-on: ubuntu-latest
    environment: DEV
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
    container:
      image: hashicorp/terraform:latest
    steps:
    - uses: actions/download-artifact@v7
      with:
        name: validate
    - name: init 
      run: terraform init
    - name: plan
      run: terraform plan -out=myplan
    - uses: actions/upload-artifact@v7
      with:
        name: myplan
        path: .
      

    needs: _validate_  

  _apply_:
    name: apply
    runs-on: ubuntu-latest
    environment: PRD
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
    container:
      image: hashicorp/terraform:latest  
    steps:
    - uses: actions/download-artifact@v7
      with:
        name: myplan
    - name: init 
      run: terraform init
    - name: apply
      run: terraform apply myplan
    needs: _plan_        