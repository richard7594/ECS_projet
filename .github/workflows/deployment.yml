name : Terraform_deploy
on:
  push:
    branches:
    - 'main'

jobs:
  _fmt_:
    name: fmt
    runs-on: ubuntu-latest
    environment: DEV
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
    container:
      image: hashicorp/terraform:latest
    steps:
    - uses: actions/checkout@v6
    - name : init 
      run : terraform init 
    - name: fmt
      run : terraform fmt --recursive

  _validate_:
    name: validate
    runs-on: ubuntu-latest
    environment: DEV
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }} 
    container:
      image: hashicorp/terraform:latest 
    steps:
    - uses: actions/checkout@v6
    - name: init 
      run: terraform init
    - name: validate
      run: terraform validate
    needs: _fmt_  
  
  _plan_:
    name: plan
    runs-on: ubuntu-latest
    environment: DEV
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
    container:
      image: hashicorp/terraform:latest
    steps:
    - uses: actions/checkout@v6
    - name: init 
      run: terraform init
    - name: plan
      run: terraform plan -out=myplan
    - uses: actions/upload-artifact@v4
      with:
        name: myplan
        path: .
      

    needs: _validate_  

  _apply_:
    name: apply
    runs-on: ubuntu-latest
    environment: DEV
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
    container:
      image: hashicorp/terraform:latest  
    steps:
    - uses: actions/checkout@v6
    - name: init 
      run: terraform init
    - name: apply
      run: terraform apply myplan
    - uses: actions/download-artifact@v4
      with:
        name: myplan
    needs: _plan_        